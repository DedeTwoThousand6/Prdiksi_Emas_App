<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gold AI Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="main-wrapper">
        <aside class="sidebar neu-card">
            <div class="logo-area">
                <h2>GOLD<span>AI</span></h2>
                <p style="font-size: 0.8rem; opacity: 0.6;">Market Predictor System</p>
            </div>

            <form id="predictionForm" style="margin-top: 30px; flex: 1; display: flex; flex-direction: column;">
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 0.75rem; font-weight: 800; opacity: 0.7;">TAHUN</label>
                    <input type="number" name="tahun" value="2026" class="input-neu">
                </div>

                <div style="margin-bottom: 25px;">
    <label style="font-size: 0.75rem; font-weight: 800; opacity: 0.7; letter-spacing: 1px;">ANALYSIS MONTH</label>
    <select name="bulan" class="input-neu">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
    </select>
</div>

                <button type="submit" class="btn-neu">ANALYZE NOW</button>
            </form>
        </aside>

        <main class="content-area">
            <div id="result-view" class="result-display" style="display: none;">
                <p id="res_date" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px;"></p>
                <h1 id="res_price"></h1>
            </div>

            <div class="chart-box">
                <img id="res_chart" src="" style="display: none;">
                <div id="placeholder-text">
                    <h2 style="opacity: 0.2;">READY TO ANALYZE</h2>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#predictionForm').on('submit', function(e){
            e.preventDefault();
            $.post('/predict', $(this).serialize(), function(res){
                $('#placeholder-text').hide();
                $('#res_date').text("Prediction for " + res.bulan_tahun);
                $('#res_price').text(res.harga);
                $('#res_chart').attr('src', 'data:image/png;base64,' + res.grafik).show();
                $('#result-view').fadeIn();
            });
        });
    </script>
</body>
</html>
